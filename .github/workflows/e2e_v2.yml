name: E2E v2

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  e2e_v2:
    name: e2e_v2 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
    - name: Install Gauge CLI and plugins
      uses: getgauge/setup-gauge@50709cf75e99bb852890c8826b9600a237981ff1 # master
      with:
        gauge-version: v1.6.28
        gauge-plugins: python, html-report
    - name: Install dependencies
      run: uv sync --group dev
    - name: Run Gauge E2E
      working-directory: e2e
      run: uv run gauge run specs
